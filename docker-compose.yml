version: '3.8'

services:
  supermodel_router:
    build:
      context: .
      dockerfile: Dockerfile
    image: supermodel_router:latest
    container_name: supermodel_router
    restart: unless-stopped
    ports:
      # 2026-06-18 15:53 升级: 改回 6473:6473 (老大拍 🅰️, 同端口升级, 客户端 0 改动)
      # 老 v3.7.1 (PID 205779, host 模式) 已被 stop, 端口空出
      # 新 v3.8.1 接 :6473, 5b SOP 端到端验真后 commit
      - "6473:6473"
    volumes:
      # 映射外部 config.yaml (改文件热重载生效, 无需重启容器)
      - ./config.yaml:/app/config.yaml:ro
      # 可选: 日志持久化
      - ./logs:/app/logs
      # v3.7.1 (P2 BUG-006 fix): 持久化 state (public_keys_state.json + model_rules_state.json)
      # 容器重启 = 不丢 per-tenant key + 用量统计
      - ./state:/app/state
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=6473
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6473/v1/health', timeout=3) or exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
