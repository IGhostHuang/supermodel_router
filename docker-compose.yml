version: '3.8'
services:
  supermodel_router:
    build:
      context: .
      dockerfile: Dockerfile
    image: supermodel_router:v3.27.0
    container_name: supermodel_router
    restart: unless-stopped
    network_mode: bridge
    dns:
    - 8.8.8.8
    - 114.114.114.114
    ports:
    - 6473:6473
    volumes:
    - ./config.yaml:/app/config.yaml:rw
    - ./supermodel_router/admin_ui.py:/app/supermodel_router/admin_ui.py:ro
    - ./supermodel_router/admin_ui_guide.py:/app/supermodel_router/admin_ui_guide.py:ro
    - ./supermodel_router/version.py:/app/supermodel_router/version.py:ro
    - ./supermodel_router/engine.py:/app/supermodel_router/engine.py:ro
    - ./supermodel_router/admin_api.py:/app/supermodel_router/admin_api.py:ro
    - ./supermodel_router/app.py:/app/supermodel_router/app.py:ro
    - ./supermodel_router/free_models.py:/app/supermodel_router/free_models.py:ro
    - ./supermodel_router/orchestrator.py:/app/supermodel_router/orchestrator.py:ro
    - ./supermodel_router/middleware.py:/app/supermodel_router/middleware.py:ro
    - ./supermodel_router/session_memory.py:/app/supermodel_router/session_memory.py:ro
    - ./supermodel_router/classifier.py:/app/supermodel_router/classifier.py:ro
    - ./supermodel_router/budget_router.py:/app/supermodel_router/budget_router.py:ro
    - ./supermodel_router/model_health.py:/app/supermodel_router/model_health.py:ro
    - ./supermodel_router/loop_engine.py:/app/supermodel_router/loop_engine.py:ro
    - ./supermodel_router/memory_bus.py:/app/supermodel_router/memory_bus.py:ro
    - ./supermodel_router/scheduler.py:/app/supermodel_router/scheduler.py:ro
    - ./supermodel_router/maker_checker.py:/app/supermodel_router/maker_checker.py:ro
    - ./supermodel_router/config.py:/app/supermodel_router/config.py:ro
    - ./supermodel_router/static/dashboard-9gong.html:/app/supermodel_router/static/dashboard-9gong.html:ro
    - ./state:/app/state
    - ./.backups:/app/.backups
    - ./secrets:/run/secrets:ro
    - ./logs:/app/logs
    # v3.15.0: 参数量 cache mount (data/model_size_cache.json WSL→容器)
    # 注意: entrypoint 需要在 /app/data 下创建 .backups 子目录,所以不能 ro
    - ./data:/app/data
    environment:
    - LOG_LEVEL=INFO
    - HOST=0.0.0.0
    - PORT=6473
    - STATE_DIR=/app/state
    - DATA_DIR=/app/data
    - CONFIG_FILE=/app/config.yaml
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:6473/v1/health', timeout=3) or exit(1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
