version: '3.8'

services:
  supermodel_router:
    build:
      context: .
      dockerfile: Dockerfile
    image: supermodel_router:v3.10.0
    container_name: supermodel_router
    restart: unless-stopped
    ports:
      # 2026-06-18 23:55 升级: v3.10.0 同端口升级 v3.9.0 → v3.10.0, 客户端 0 改动
      - "6473:6473"
    volumes:
      # 配置 (entrypoint 需 :rw 写入占位符渲染的真 key, 改文件热重载生效, 无需重启容器)
      # 注意: 必须 :rw, 不然 entrypoint 渲染 secret 时 write 失败 (ro 会 silent skip)
      # v3.10.1 修 BUG-002: 显式 :rw 避免被误改 :ro
      - ./config.yaml:/app/config.yaml:rw
      # v3.11 集成 v0.9: admin UI 8 卦 dashboard 路由 (admin_ui.py 改动, 热重载)
      - ./supermodel_router/admin_ui.py:/app/supermodel_router/admin_ui.py:ro
      # v3.11 集成 v0.9: 8 卦 dashboard 静态 HTML
      - ./supermodel_router/static/dashboard-9gong.html:/app/supermodel_router/static/dashboard-9gong.html:ro
      # 💾 State 持久化 (老大拍 🅰️+💾 持久化优先)
      # 容器重建/升级 = state 不丢
      - ./state:/app/state
      # 💾 配置/版本备份 (entrypoint 写 .backups/, 不进 image)
      - ./.backups:/app/.backups
      # 💾 Docker secrets (chmod 600, entrypoint 渲染真 key 到 config.yaml 占位符)
      # 用法: mkdir -p secrets && echo -n "sk-..." > secrets/openrouter && chmod 600 secrets/openrouter
      - ./secrets:/run/secrets:ro
      # 可选: 日志持久化
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=6473
      - STATE_DIR=/app/state
      - DATA_DIR=/app/data
      - CONFIG_FILE=/app/config.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6473/v1/health', timeout=3) or exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s  # v3.10.0: 留 15s 给 entrypoint seed state + render secrets
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
