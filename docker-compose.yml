version: '3.8'

services:
  supermodel_router:
    build:
      context: .
      dockerfile: Dockerfile
    image: supermodel_router:latest
    container_name: supermodel_router
    restart: unless-stopped
    ports:
      - "6473:6473"
    volumes:
      # 映射外部 config.yaml (改文件热重载生效, 无需重启容器)
      - ./config.yaml:/app/config.yaml:ro
      # 可选: 日志持久化
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=6473
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6473/v1/health', timeout=3) or exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
