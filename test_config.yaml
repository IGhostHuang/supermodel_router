server:
  host: "0.0.0.0"
  port: 1298
  api_key: ""

routing:
  strategy: "round-robin"
  failover_threshold: 3
  recovery_interval: 300
  max_retry: 2
  retry_backoff_ms: [0, 500]

providers:
  openrouter:
    enabled: true
    base_url: "https://openrouter.ai/api/v1"
    api_keys:
      - ""  # 替换为你的真实 OpenRouter key
    model_rules:
      mode: "pattern"
      pattern: ".*:free"
    max_concurrent: 3
    health_check_interval: 300
