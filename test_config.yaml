server:
  host: 0.0.0.0
  port: 6473
  api_key: ''
routing:
  strategy: round-robin
  failover_threshold: 3
  recovery_interval: 300
  max_retry: 2
  retry_backoff_ms:
  - 0
  - 500
providers:
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api/v1
    api_keys:
    - ''
    model_rules:
      mode: pattern
      pattern: .*:free
    max_concurrent: 3
    health_check_interval: 300
  魔塔免费模型:
    enabled: true
    base_url: https://api-inference.modelscope.cn/v1
    api_keys:
    - ms-e007af1d-c01f-41e7-a027-9700af10bebc
    model_rules:
      mode: pattern
      pattern: Qwen-Image|Kolors
    max_concurrent: 3
    health_check_interval: 300
