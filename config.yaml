server:
  host: 0.0.0.0
  port: 6473
  api_key: ''
modality_auto_routing:
  enabled: true
  top_k: 5
  routing_table:
    text:
      text:
      - text-only
      - multimodal
      image:
      - image-gen
      audio:
      - audio-gen
      video:
      - video-gen
    image:
      text:
      - multimodal
      image:
      - image-gen
      audio: []
      video: []
    audio:
      text:
      - audio-gen
      - multimodal
      audio:
      - audio-gen
    video:
      text:
      - video-gen
      - multimodal
      video:
      - video-gen
  fallback_order:
  - multimodal
  - text-only
routing:
  strategy: quality_weighted
  failover_threshold: 3
  recovery_interval: 300
  max_retry: 2
  first_token_timeout_ms: 10000
  retry_backoff_ms:
  - 0
  - 500
  quality_weights:
    success_rate: 0.6
    latency: 0.4
providers:
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api/v1
    api_keys:
    - <OPENROUTER_API_KEY_PLACEHOLDER>
    model_rules:
      mode: pattern
      pattern: .*-free$|.*free.*
      exclude: []
    max_concurrent: 2
    health_check_interval: 300
  newapi:
    enabled: false
    base_url: https://your-newapi-endpoint/v1
    api_keys:
    - ''
    model_rules:
      mode: include
      include:
      - deepseek/deepseek-v4-flash
      - deepseek/deepseek-v4-pro
      - minimaxai/minimax-m3
      exclude: []
    max_concurrent: 3
    health_check_interval: 300
  aihubmix:
    enabled: false
    base_url: https://aihubmix.com/v1
    api_keys:
    - ''
    model_rules:
      mode: all
      exclude:
      - .*-legacy.*
    max_concurrent: 3
    health_check_interval: 600
  volc_ark:
    enabled: false
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_keys:
    - ''
    model_rules:
      mode: include
      include:
      - doubao-seed-code
      - doubao-seed-coder
      - doubao-1-5-pro-32k
      - doubao-1-5-pro-256k
      - doubao-pro-32k
      - doubao-pro-256k
      - doubao-lite-32k
      exclude: []
    max_concurrent: 5
    health_check_interval: 300
model_management:
  enabled: true
  state_dir: /app/state
  discovery:
    schedule: 600
    notify_on_change: true
  webhook:
    url: ''
    headers: {}
classifier:
  tier_bonus:
    pro: 35
context_bridge:
  enabled: true
  stale_threshold_seconds: 1800
  max_history: 5
  sentinel_enabled: true
  abort_on_switch: true
  max_tracked_requests: 1000
  version: 3.5.0
