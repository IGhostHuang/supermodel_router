server:
  host: 0.0.0.0
  port: 6473
  api_key: ''
modality_auto_routing:
  enabled: true
  top_k: 5
  routing_table:
    text:
      text:
      - text-only
      - multimodal
      image:
      - image-gen
      audio:
      - audio-gen
      video:
      - video-gen
    image:
      text:
      - multimodal
      image:
      - image-gen
      audio: []
      video: []
    audio:
      text:
      - audio-gen
      - multimodal
      audio:
      - audio-gen
    video:
      text:
      - video-gen
      - multimodal
      video:
      - video-gen
  fallback_order:
  - multimodal
  - text-only
routing:
  strategy: quality_weighted
  failover_threshold: 3
  recovery_interval: 300
  max_retry: 2
  first_token_timeout_ms: 10000
  retry_backoff_ms:
  - 0
  - 500
  quality_weights:
    success_rate: 0.6
    latency: 0.4
  # v3.9.0 (Phase H): group-based 轮询策略 (跟 mgm.model_groups 协作)
  # group_strategy: 4 选项, 默认 round-robin-group
  #   - flat: 老 v4 行为, 全局按综合分降序 (忽略 model_groups)
  #   - round-robin-group: 按 group 分桶, 桶间轮询 (新 default)
  #   - group-failover: 按 group 优先级, group A 全失败才 group B
  #   - group-weighted: 按 group_weights 加权随机决定 group 顺序
  group_strategy: round-robin-group
  # v3.9.0 (Phase H): group-weighted 策略专用, group_name → weight (高 weight 先抽)
  group_weights: {}
providers:
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api/v1
    api_keys:
    - <OPENROUTER_API_KEY_PLACEHOLDER>
    model_rules:
      mode: pattern
      pattern: .*-free$|.*free.*
      exclude: []
    max_concurrent: 2
    health_check_interval: 300
  newapi:
    enabled: true
    base_url: https://2154.17b331.com/v1
    api_keys:
    - <NEWAPI_API_KEY_PLACEHOLDER>
    model_rules:
      mode: include
      include:
      - mainrouter
      exclude: []
    max_concurrent: 3
    health_check_interval: 300
  aihubmix:
    enabled: false
    base_url: https://aihubmix.com/v1
    api_keys:
    - ''
    model_rules:
      mode: all
      exclude:
      - .*-legacy.*
    max_concurrent: 3
    health_check_interval: 600
  volc_ark:
    enabled: false
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_keys:
    - ''
    model_rules:
      mode: include
      include:
      - doubao-seed-code
      - doubao-seed-coder
      - doubao-1-5-pro-32k
      - doubao-1-5-pro-256k
      - doubao-pro-32k
      - doubao-pro-256k
      - doubao-lite-32k
      exclude: []
    max_concurrent: 5
    health_check_interval: 300
model_management:
  enabled: true
  state_dir: /app/state
  discovery:
    schedule: 600
    notify_on_change: true
  webhook:
    url: ''
    headers: {}
classifier:
  tier_bonus:
    pro: 35
context_bridge:
  enabled: true
  stale_threshold_seconds: 1800
  max_history: 5
  sentinel_enabled: true
  abort_on_switch: true
  max_tracked_requests: 1000
  version: 3.5.0
  compress_on_switch: true
  compress_overhead: 0.8
  compress_strategy: auto
  compress_keep_last_messages: 6
