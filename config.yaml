server:
  host: 0.0.0.0
  port: 6473
  api_key: ''
modality_auto_routing:
  enabled: true
  top_k: 5
  routing_table:
    text:
      text:
      - text-only
      - multimodal
      image:
      - image-gen
      audio:
      - audio-gen
      video:
      - video-gen
    image:
      text:
      - multimodal
      image:
      - image-gen
      audio: []
      video: []
    audio:
      text:
      - audio-gen
      - multimodal
      audio:
      - audio-gen
    video:
      text:
      - video-gen
      - multimodal
      video:
      - video-gen
  fallback_order:
  - multimodal
  - text-only
routing:
  strategy: flat
  failover_threshold: 3
  recovery_interval: 300
  max_retry: 2
  first_token_timeout_ms: 10000
  retry_backoff_ms:
  - 0
  - 500
  quality_weights:
    success_rate: 0.6
    latency: 0.4
  group_strategy: group-weighted
  group_weights: {}
providers:
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api/v1
    api_keys:
    - <OPENROUTER_API_KEY_PLACEHOLDER>
    - <OPENROUTER_API_KEY_PLACEHOLDER>
    model_rules:
      mode: pattern
      pattern: free
    max_concurrent: 2
    health_check_interval: 300
  nvidia:
    enabled: true
    base_url: https://integrate.api.nvidia.com/v1
    api_keys:
    - <NVIDIA_API_KEY_PLACEHOLDER>
    - <NVIDIA_API_KEY_PLACEHOLDER>
    - <NVIDIA_API_KEY_PLACEHOLDER>
    model_rules:
      mode: all
    max_concurrent: 3
    health_check_interval: 300
  newapi:
    enabled: true
    base_url: https://2154.17b331.com/v1
    api_keys:
    - <API_KEY_PLACEHOLDER>
    model_rules:
      mode: all
    max_concurrent: 3
    health_check_interval: 300
  volc_ark:
    enabled: true
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_keys:
    - <VOLC_ARK_API_KEY_PLACEHOLDER>
    model_rules:
      mode: include
      include:
      - ark-code-latest
      - GLM-5.2
      - DeepSeek-V4-Pro
      - Kimi-K2.7-Code
      - Doubao-Seed-2.0-pro
      - Doubao-Seed-2.0-Code
      - DeepSeek-V4-Flash
      - MiniMax-M3
      - Kimi-K2.6
      - MiniMax-M2.7
    max_concurrent: 5
    health_check_interval: 300
  魔塔免费模型:
    base_url: https://api-inference.modelscope.cn/v1
    api_keys:
    - <MODELSCOPE_API_KEY_PLACEHOLDER>
    model_rules:
      mode: pattern
    max_concurrent: 3
    enabled: true
  cloudflare:
    base_url: https://api.cloudflare.com/client/v4/accounts/46074539b24bfe7d72371b36cc4c1e2a/ai/v1
    api_keys:
    - <CLOUDFLARE_API_KEY_PLACEHOLDER>
    model_rules:
      mode: pattern
      pattern: '@cf'
    max_concurrent: 3
    enabled: true
model_management:
  enabled: true
  state_dir: /app/state
  discovery:
    schedule: 600
    notify_on_change: true
  webhook:
    url: ''
    headers: {}
classifier:
  tier_bonus:
    pro: 35
context_bridge:
  enabled: true
  stale_threshold_seconds: 1800
  max_history: 5
  sentinel_enabled: true
  abort_on_switch: true
  max_tracked_requests: 1000
  version: 3.5.0
  compress_on_switch: true
  compress_overhead: 0.8
  compress_strategy: auto
  compress_keep_last_messages: 6
v0_9_integration:
  version: '0.9'
  integration_date: '2026-06-21'
  provider_trigram:
    minimax-cn:
      trigram: 离
      hou_tian_position: 南
      xian_tian_number: 8
      wu_xing: 火 (二七合)
      san_yi: 周易 (未来)
      fire_hou: 午时履 (11-13)
      role: 主路由 (m3 默认)
    newapi:
