# ============================================================
# SuperModel Router Config v3.0 — 模态感知 / 多 provider / 多 key 轮询
# ============================================================
server:
  host: "0.0.0.0"
  port: 1298
  api_key: ""

# (new) 模态感知自动路由
modality_auto_routing:
  enabled: true
  # 每个模态分组轮询 top K 个评分最高的模型
  top_k: 5
  # 优先级队列: 输入类型 → 输出类型 → [目标模态列表] (降序)
  routing_table:
    text:
      text:
        - "text-only"
        - "multimodal"
      image:
        - "image-gen"
      audio:
        - "audio-gen"
      video:
        - "video-gen"
    image:
      text:
        - "multimodal"
      image:
        - "image-gen"
      audio: []
      video: []
    audio:
      text:
        - "audio-gen"
        - "multimodal"
      audio:
        - "audio-gen"
    video:
      text:
        - "video-gen"
        - "multimodal"
      video:
        - "video-gen"
  # 降级策略: 目标模态无可用模型时, 尝试这些
  fallback_order:
    - "multimodal"
    - "text-only"

routing:
  # 模型选择策略: round-robin | quality_weighted | failover
  strategy: "quality_weighted"
  failover_threshold: 3
  recovery_interval: 300
  max_retry: 2
  first_token_timeout_ms: 10000
  retry_backoff_ms: [0, 500]
  # 质量评分: 成功率权重 (0-1) vs 延迟权重 (0-1)
  quality_weights:
    success_rate: 0.6
    latency: 0.4

# ============================================================
# Providers
# 每个 provider 支持:
#   model_rules.mode: pattern | include | exclude | all
#   model_rules.pattern: 正则匹配免费模型 (如 ".*free.*")
#   model_rules.include: 白名单模型 ID 列表
#   model_rules.exclude: 黑名单模型 ID 列表 (所有 mode 都生效)
#   model_rules.free_regex: 附加免费模型正则 (与 mode 叠加)
#   多 api_keys 自动轮询, 失败切换
# ============================================================
providers:
  # 按 pattern 匹配免费模型
  openrouter:
    enabled: true
    base_url: "https://openrouter.ai/api/v1"
    api_keys:
      - ""  # 多个 key 自动轮询
    model_rules:
      mode: "pattern"
      pattern: ".*-free$|.*free.*"
      exclude: []
    max_concurrent: 2
    health_check_interval: 300

  # 按 include 白名单
  newapi:
    enabled: true
    base_url: "https://your-newapi-endpoint/v1"
    api_keys:
      - ""
    model_rules:
      mode: "include"
      include:
        - "deepseek/deepseek-v4-flash"
        - "deepseek/deepseek-v4-pro"
        - "minimaxai/minimax-m3"
      exclude: []
    max_concurrent: 3
    health_check_interval: 300

  # 所有模型, 按 exclude 黑名单
  aihubmix:
    enabled: false
    base_url: "https://aihubmix.com/v1"
    api_keys:
      - ""
    model_rules:
      mode: "all"
      exclude:
        - ".*-legacy.*"
    max_concurrent: 3
    health_check_interval: 600
