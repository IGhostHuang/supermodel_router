server:
  host: "127.0.0.1"
  port: 15678             # 测试专用端口, 避免跟 5678 默认冲突
  api_key: ""             # 测试时不鉴权
  cors_origins: ["*"]

routing:
  strategy: "round-robin"
  max_retry: 1
  first_token_timeout: 5000
  request_timeout: 15000

sync:
  auto_discover: true
  interval: 0              # 测试环境不周期刷新

providers:
  mock-primary:
    base_url: "http://127.0.0.1:15679/v1"
    api_keys:
      - "sk-test-key-1"
      - "sk-test-key-2"
    model_rules:
      mode: "pattern"
      pattern: ".*free.*"
    max_concurrent: 5
    enabled: true

  mock-disabled:
    base_url: "http://127.0.0.1:15679/v1"
    api_keys:
      - "sk-disabled"
    model_rules:
      mode: "all"
    enabled: false
